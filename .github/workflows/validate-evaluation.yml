name: Validate Evaluation System

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m py_compile graders/basic.py evaluate.py
      - run: python -m unittest tests/test_basic_grader.py
      - run: python evaluate.py --task tasks/creative.json --record samples/runs/run_001_human.json
